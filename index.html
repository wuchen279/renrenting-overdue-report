<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人人租 · 逾期数据后台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: #f0f2f5;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .header h1 { font-size: 22px; }
        .header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .update-time { font-size: 12px; opacity: 0.8; }

        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            position: relative;
        }
        .kpi-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .kpi-card .value { font-size: 28px; font-weight: 700; }
        .kpi-card .value.danger { color: #e53935; }
        .kpi-card .value.success { color: #43a047; }
        .kpi-card .value.neutral { color: #1a73e8; }
        .kpi-card .delta {
            font-size: 12px;
            margin-top: 6px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        .delta.up { background: #ffebee; color: #e53935; }
        .delta.down { background: #e8f5e9; color: #43a047; }
        .delta.flat { background: #f5f5f5; color: #888; }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .chart-card h3 {
            font-size: 15px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .chart-card.full { grid-column: 1 / -1; }

        .report-list {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .report-list h3 {
            font-size: 15px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .report-card {
            display: block;
            padding: 16px;
            border-radius: 8px;
            background: #f8f9fa;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
            border: 1px solid #eee;
        }
        .report-card:hover {
            background: #e8f0fe;
            border-color: #1a73e8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26,115,232,0.15);
        }
        .report-card .month { font-size: 16px; font-weight: 600; color: #1a73e8; }
        .report-card .rate { font-size: 13px; color: #666; margin-top: 4px; }
        .report-card .tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }
        .tag.latest { background: #e8f5e9; color: #43a047; }
        .tag.normal { background: #f5f5f5; color: #888; }

        .loading { text-align: center; padding: 60px; color: #999; }
        .error  { text-align: center; padding: 60px; color: #e53935; }

        @media (max-width: 768px) {
            .chart-grid { grid-template-columns: 1fr; }
            .header { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>人人租 · 逾期数据后台</h1>
        <div class="subtitle">Rental Overdue Analysis Dashboard</div>
    </div>
    <div class="update-time" id="updateTime">数据加载中...</div>
</div>

<div class="container">

    <!-- KPI 卡片 -->
    <div class="kpi-row" id="kpiRow">
        <div class="loading">正在加载 KPI 数据...</div>
    </div>

    <!-- 趋势图表 -->
    <div class="chart-grid">
        <div class="chart-card full">
            <h3>逾期率趋势（月环比）</h3>
            <canvas id="trendChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>订单量趋势</h3>
            <canvas id="orderChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>逾期订单量趋势</h3>
            <canvas id="overdueChart"></canvas>
        </div>
    </div>

    <!-- 月度报告入口 -->
    <div class="report-list">
        <h3>月度报告</h3>
        <div class="report-grid" id="reportGrid">
            <div class="loading">正在加载报告列表...</div>
        </div>
    </div>
</div>

<script>
/* 工具函数 */
function formatNum(n) {
    if (n == null) return '--';
    return Number(n).toLocaleString('zh-CN');
}

function calcDelta(curr, prev, isRate) {
    if (prev == null && prev !== 0) return '';
    var d = isRate ? (curr - prev) : (curr - prev);
    if (d === 0) return '<span class="delta flat">— 持平</span>';
    var absD = Math.abs(d);
    var pct = prev ? ((absD / Math.abs(prev)) * 100).toFixed(1) : '—';
    if (d > 0) {
        var v = isRate ? d.toFixed(2) + '%' : formatNum(d);
        return '<span class="delta up">▲ ' + v + '（' + pct + '%）</span>';
    } else {
        var v2 = isRate ? absD.toFixed(2) + '%' : formatNum(absD);
        return '<span class="delta down">▼ ' + v2 + '（' + pct + '%）</span>';
    }
}

/* 渲染 KPI 卡片 */
function renderKPI(data) {
    var latest = data[data.length - 1];
    var prev = data.length >= 2 ? data[data.length - 2] : null;

    var rateColor = latest.overdue_rate > 10 ? 'danger' : 'success';
    var rateDelta = calcDelta(latest.overdue_rate, prev ? prev.overdue_rate : null, true);
    var orderDelta = calcDelta(latest.total_orders, prev ? prev.total_orders : null, false);
    var ovdDelta = calcDelta(latest.overdue_orders, prev ? prev.overdue_orders : null, false);

    document.getElementById('kpiRow').innerHTML =
        '<div class="kpi-card">' +
            '<div class="label">最新月份</div>' +
            '<div class="value neutral" style="font-size:20px;">' + latest.label + '</div>' +
        '</div>' +
        '<div class="kpi-card">' +
            '<div class="label">订单总量</div>' +
            '<div class="value neutral">' + formatNum(latest.total_orders) + '</div>' +
            orderDelta +
        '</div>' +
        '<div class="kpi-card">' +
            '<div class="label">逾期订单数</div>' +
            '<div class="value danger">' + formatNum(latest.overdue_orders) + '</div>' +
            ovdDelta +
        '</div>' +
        '<div class="kpi-card">' +
            '<div class="label">逾期率</div>' +
            '<div class="value ' + rateColor + '">' + latest.overdue_rate.toFixed(2) + '%</div>' +
            rateDelta +
        '</div>';

    document.getElementById('updateTime').textContent = '最新数据：' + latest.label;
}

/* 渲染趋势图表 */
function renderCharts(data) {
    var labels = data.map(function(d) { return d.month; });
    var rates  = data.map(function(d) { return d.overdue_rate; });
    var totals = data.map(function(d) { return d.total_orders; });
    var ovds   = data.map(function(d) { return d.overdue_orders; });

    new Chart(document.getElementById('trendChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '逾期率（%）',
                    data: rates,
                    backgroundColor: rates.map(function(r) {
                        return r > 10 ? 'rgba(229,57,53,0.6)' : 'rgba(26,115,232,0.6)';
                    }),
                    borderColor: 'rgba(26,115,232,1)',
                    borderWidth: 1,
                    yAxisID: 'y',
                },
                {
                    label: '趋势线',
                    data: rates,
                    type: 'line',
                    borderColor: '#e53935',
                    backgroundColor: 'rgba(229,57,53,0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 5,
                    pointBackgroundColor: '#e53935',
                    yAxisID: 'y',
                }
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'top' } },
            scales: {
                y: { beginAtZero: true, title: { display: true, text: '逾期率（%）' } }
            }
        }
    });

    new Chart(document.getElementById('orderChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '订单总量',
                data: totals,
                backgroundColor: 'rgba(26,115,232,0.6)',
                borderColor: 'rgba(26,115,232,1)',
                borderWidth: 1,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, title: { display: true, text: '订单数' } }
            }
        }
    });

    new Chart(document.getElementById('overdueChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '逾期订单数',
                data: ovds,
                backgroundColor: ovds.map(function(v) {
                    return v > 100 ? 'rgba(229,57,53,0.6)' : 'rgba(255,152,0,0.6)';
                }),
                borderColor: ovds.map(function(v) {
                    return v > 100 ? 'rgba(229,57,53,1)' : 'rgba(255,152,0,1)';
                }),
                borderWidth: 1,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, title: { display: true, text: '逾期订单数' } }
            }
        }
    });
}

/* 渲染月度报告卡片 */
function renderReports(data) {
    var monthNames = {
        '01':'1月','02':'2月','03':'3月','04':'4月','05':'5月','06':'6月',
        '07':'7月','08':'8月','09':'9月','10':'10月','11':'11月','12':'12月'
    };
    var grid = document.getElementById('reportGrid');
    var html = '';
    var reversed = data.slice().reverse();

    reversed.forEach(function(m, idx) {
        var isLatest = (idx === 0);
        var parts = m.month.split('-');
        var mm = parts[1];
        var reportFile = 'report-' + m.month + '.html';
        var tagClass = isLatest ? 'latest' : 'normal';
        var tagText = isLatest ? '最新' : '查看详情';

        html += '<a class="report-card" href="' + reportFile + '">' +
                    '<div class="month">' + parts[0] + '年 ' + (monthNames[mm] || mm) + ' 报告</div>' +
                    '<div class="rate">逾期率：<b>' + m.overdue_rate.toFixed(2) + '%</b>（' +
                    formatNum(m.overdue_orders) + '/' + formatNum(m.total_orders) + ' 单）</div>' +
                    '<span class="tag ' + tagClass + '">' + tagText + '</span>' +
                '</a>';
    });

    grid.innerHTML = html;
}

/* 初始化 */
fetch('data/monthly_summary.json')
    .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    })
    .then(function(data) {
        if (!data || data.length === 0) {
            document.getElementById('kpiRow').innerHTML =
                '<div class="error">暂无数据</div>';
            return;
        }
        renderKPI(data);
        renderCharts(data);
        renderReports(data);
    })
    .catch(function(err) {
        console.error(err);
        document.getElementById('kpiRow').innerHTML =
            '<div class="error">数据加载失败：' + err.message + '</div>';
    });
</script>
</body>
</html>
